<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>

  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 引入 React 和 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- 引入 Babel 用于在浏览器中编译 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入 Supabase 客户端 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 引入 bcryptjs 用于密码验证 -->
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>

  <!-- 配置文件 -->
  <script src="js/config.js"></script>
  <!-- 配置加载器 -->
  <script src="js/config-loader.js"></script>
  <!-- 引入 Supabase API 封装 -->
  <script src="js/supabase_api.js"></script>

  <style>
    /* 整体背景 - 蓝、浅蓝、白配色 */
    body {
      background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 50%, #ffffff 100%);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* DarkVeil 画布样式 */
    .darkveil-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
    }

    /* 登录表单动画 */
    .login-form {
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 左侧品牌区域动画 */
    .brand-section {
      animation: fadeInLeft 0.8s ease-out;
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* 输入框焦点效果 */
    .input-focus:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* 按钮悬停效果 */
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
    }

    /* 密码显示/隐藏动画 */
    .password-toggle {
      transition: all 0.2s ease;
    }

    .password-toggle:hover {
      color: #3b82f6;
    }

    /* 文字渐变效果 - 黑色 */
    .text-gradient {
      background: black;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 加载动画 */
    .loading-spinner {
      border: 2px solid #f3f4f6;
      border-top: 2px solid #3b82f6;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- DarkVeil 动态背景组件（使用原生 WebGL） ---
    function DarkVeil({
      hueShift = 0,
      noiseIntensity = 0,
      scanlineIntensity = 0,
      speed = 0.5,
      scanlineFrequency = 0,
      warpAmount = 0,
      resolutionScale = 1
    }) {
      const ref = useRef(null);

      useEffect(() => {
        const canvas = ref.current;
        if (!canvas) return;

        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return;

        // Vertex shader
        const vertexShaderSource = `
          attribute vec2 position;
          void main() {
            gl_Position = vec4(position, 0.0, 1.0);
          }
        `;

        // Fragment shader (simplified version)
        const fragmentShaderSource = `
          precision mediump float;
          uniform vec2 uResolution;
          uniform float uTime;
          uniform float uHueShift;
          uniform float uNoise;
          uniform float uScan;
          uniform float uScanFreq;
          uniform float uWarp;

          float rand(vec2 c) {
            return fract(sin(dot(c, vec2(12.9898, 78.233))) * 43758.5453);
          }

          vec3 hueShiftRGB(vec3 col, float deg) {
            float rad = radians(deg);
            float c = cos(rad);
            float s = sin(rad);
            mat3 rgb2yiq = mat3(0.299, 0.587, 0.114, 0.596, -0.274, -0.322, 0.211, -0.523, 0.312);
            mat3 yiq2rgb = mat3(1.0, 0.956, 0.621, 1.0, -0.272, -0.647, 1.0, -1.106, 1.703);
            vec3 yiq = rgb2yiq * col;
            vec3 yiqShift = vec3(yiq.x, yiq.y * c - yiq.z * s, yiq.y * s + yiq.z * c);
            return clamp(yiq2rgb * yiqShift, 0.0, 1.0);
          }

          void main() {
            vec2 uv = gl_FragCoord.xy / uResolution.xy * 2.0 - 1.0;
            uv.y *= -1.0;

            // 蓝、浅蓝、白配色渐变效果
            float time = uTime * 1.8;

            // 创建配色基础色
            vec3 blue = vec3(0.23, 0.51, 0.94);          // 蓝色 (#3b82f6)
            vec3 lightBlue = vec3(0.38, 0.65, 0.98);     // 浅蓝色 (#60a5fa)
            vec3 veryLightBlue = vec3(0.85, 0.92, 1.0);   // 很浅的蓝色
            vec3 white = vec3(1.0, 1.0, 1.0);             // 白色

            // 使用 UV 坐标和时间创建动态渐变
            float gradientPos = uv.y * 0.5 + 0.5 + sin(uv.x * 2.0 + time * 0.5) * 0.1;

            vec3 color;
            if (gradientPos < 0.33) {
              color = mix(blue, lightBlue, gradientPos * 3.0);
            } else if (gradientPos < 0.66) {
              color = mix(lightBlue, veryLightBlue, (gradientPos - 0.33) * 3.0);
            } else {
              color = mix(veryLightBlue, white, (gradientPos - 0.66) * 3.0);
            }

            // 添加柔和的波浪效果
            float wave1 = sin(uv.x * 3.0 + time * 0.8) * 0.03;
            float wave2 = cos(uv.y * 2.5 + time * 1.0) * 0.03;
            color += vec3(wave1 * 0.3, wave1 * 0.2, wave1) * 0.5;
            color += vec3(wave2 * 0.2, wave2 * 0.3, wave2) * 0.5;

            color = hueShiftRGB(color, uHueShift);

            // 添加微妙的噪点
            color += (rand(gl_FragCoord.xy + uTime) - 0.5) * uNoise;

            gl_FragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
          }
        `;

        // Create shader
        function createShader(gl, type, source) {
          const shader = gl.createShader(type);
          gl.shaderSource(shader, source);
          gl.compileShader(shader);
          if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('Shader compile error:', gl.getShaderInfoLog(shader));
            gl.deleteShader(shader);
            return null;
          }
          return shader;
        }

        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);

        if (!vertexShader || !fragmentShader) return;

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          console.error('Program link error:', gl.getProgramInfoLog(program));
          return;
        }

        gl.useProgram(program);

        // Create geometry (a triangle that covers the screen)
        const positions = new Float32Array([
          -1, -1,
           3, -1,
          -1,  3
        ]);

        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

        const positionLocation = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        // Get uniform locations
        const uResolution = gl.getUniformLocation(program, 'uResolution');
        const uTime = gl.getUniformLocation(program, 'uTime');
        const uHueShift = gl.getUniformLocation(program, 'uHueShift');
        const uNoise = gl.getUniformLocation(program, 'uNoise');
        const uScan = gl.getUniformLocation(program, 'uScan');
        const uScanFreq = gl.getUniformLocation(program, 'uScanFreq');
        const uWarp = gl.getUniformLocation(program, 'uWarp');

        const resize = () => {
          const w = window.innerWidth;
          const h = window.innerHeight;
          canvas.width = w * resolutionScale;
          canvas.height = h * resolutionScale;
          gl.viewport(0, 0, canvas.width, canvas.height);
          gl.uniform2f(uResolution, w, h);
        };

        window.addEventListener('resize', resize);
        resize();

        const start = performance.now();
        let frame = 0;

        const loop = () => {
          const currentTime = ((performance.now() - start) / 1000) * speed;
          gl.uniform1f(uTime, currentTime);
          gl.uniform1f(uHueShift, hueShift);
          gl.uniform1f(uNoise, noiseIntensity);
          gl.uniform1f(uScan, scanlineIntensity);
          gl.uniform1f(uScanFreq, scanlineFrequency);
          gl.uniform1f(uWarp, warpAmount);
          gl.drawArrays(gl.TRIANGLES, 0, 3);
          frame = requestAnimationFrame(loop);
        };

        loop();

        return () => {
          cancelAnimationFrame(frame);
          window.removeEventListener('resize', resize);
        };
      }, [hueShift, noiseIntensity, scanlineIntensity, speed, scanlineFrequency, warpAmount, resolutionScale]);

      return <canvas ref={ref} className="darkveil-canvas" />;
    }

    // --- 图标组件 ---
    const Icon = ({ name, className }) => {
      const icons = {
        Eye: <React.Fragment><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></React.Fragment>,
        EyeOff: <React.Fragment><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" x2="23" y1="1" y2="23"></line></React.Fragment>,
        User: <React.Fragment><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></React.Fragment>,
        Lock: <React.Fragment><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></React.Fragment>,
        ArrowRight: <polyline points="9 18 15 12 9 6"></polyline>,
        AlertCircle: <React.Fragment><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></React.Fragment>
      };

      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name] || <circle cx="12" cy="12" r="10" />}
        </svg>
      );
    };

    // --- 登录状态管理 ---
    const LoginManager = {
      // 保存登录信息（含过期时间）
      saveLoginInfo(userData) {
        const loginInfo = {
          user: userData,
          loginTime: new Date().getTime(),
          expiresIn: 24 * 60 * 60 * 1000 // 24小时
        };
        localStorage.setItem('h5cms_login_info', JSON.stringify(loginInfo));
      },

      // 获取登录信息
      getLoginInfo() {
        const loginInfo = localStorage.getItem('h5cms_login_info');
        if (!loginInfo) return null;

        try {
          const parsed = JSON.parse(loginInfo);
          const now = new Date().getTime();

          // 检查是否过期
          if (now - parsed.loginTime > parsed.expiresIn) {
            this.clearLoginInfo();
            return null;
          }

          return parsed;
        } catch (error) {
          console.error('解析登录信息失败:', error);
          this.clearLoginInfo();
          return null;
        }
      },

      // 清除登录信息
      clearLoginInfo() {
        localStorage.removeItem('h5cms_login_info');
        localStorage.removeItem('h5cms_token');
      },

      // 检查是否已登录且未过期
      isLoggedIn() {
        const loginInfo = this.getLoginInfo();
        return !!loginInfo?.user;
      },

      // 获取用户权限
      getUserRole() {
        const loginInfo = this.getLoginInfo();
        return loginInfo?.user?.role || 'user'; // 默认用户
      }
    };

    // --- 登录验证函数 ---
    const validateLogin = (username, password) => {
      const errors = [];

      if (!username.trim()) {
        errors.push('请输入用户名');
      }

      if (!password.trim()) {
        errors.push('请输入密码');
      } else if (password.length < 6) {
        errors.push('密码长度至少为6位');
      }

      return errors;
    };

    // --- 角色名称映射 ---
    const roleMap = {
      1: 'super_admin',  // 超级管理员
      2: 'admin',        // 管理员
      3: 'operator'      // 运营人员
    };

    const roleNameMap = {
      1: '超级管理员',
      2: '管理员',
      3: '运营人员'
    };

    // --- 使用数据库的真实登录API ---
    const loginAPI = async (username, password) => {
      // 确保 API 已初始化
      if (!window.H5CmsAPI) {
        throw new Error('API服务未初始化');
      }

      // 调用真实的登录API
      const result = await window.H5CmsAPI.AuthAPI.login(username, password);

      if (result.code !== 200) {
        throw new Error(result.message || '登录失败');
      }

      // 转换用户数据格式，保持与原代码兼容
      const user = result.data;
      // 确保 role 是数字类型（可能从数据库返回的是字符串）
      const roleId = typeof user.role === 'string' ? parseInt(user.role, 10) : user.role;
      console.log('登录API返回的用户数据:', user);
      console.log('解析后的 roleId:', roleId);
      console.log('对应的角色:', roleMap[roleId]);
      return {
        id: user.id,
        username: user.username,
        name: user.real_name || user.username,
        role: roleMap[roleId] || 'user',
        roleId: roleId,
        roleName: roleNameMap[user.role] || '用户',
        email: user.email || '',
        phone: user.phone || '',
        avatar: user.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.username}`,
        status: user.status,
        last_login_time: user.last_login_time
      };
    };

    // --- 主组件 ---
    function LoginApp() {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [rememberMe, setRememberMe] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [errors, setErrors] = useState([]);
      const [successMessage, setSuccessMessage] = useState('');

      // 检查是否已登录
      useEffect(() => {
        if (LoginManager.isLoggedIn()) {
          // 已登录，跳转到首页
          setTimeout(() => {
            window.location.href = 'homepage.html';
          }, 1000);
        }
      }, []);

      // 处理登录
      const handleLogin = async (e) => {
        e.preventDefault();

        // 清除之前的错误和成功信息
        setErrors([]);
        setSuccessMessage('');

        // 验证输入
        const validationErrors = validateLogin(username, password);
        if (validationErrors.length > 0) {
          setErrors(validationErrors);
          return;
        }

        setIsLoading(true);

        try {
          // 调用真实的登录API
          const userData = await loginAPI(username, password);

          // 保存登录信息
          LoginManager.saveLoginInfo(userData);

          // 显示成功信息
          setSuccessMessage('登录成功，正在跳转...');

          // 跳转到首页
          setTimeout(() => {
            window.location.href = 'homepage.html';
          }, 1500);

        } catch (error) {
          setErrors([error.message]);
        } finally {
          setIsLoading(false);
        }
      };

      // 处理键盘事件
      const handleKeyPress = (e) => {
        if (e.key === 'Enter') {
          handleLogin(e);
        }
      };

      return (
        <div className="min-h-screen flex justify-center relative">
          {/* 动态背景 */}
          <DarkVeil
            hueShift={0}
            noiseIntensity={0.02}
            scanlineIntensity={0}
            speed={0.5}
            scanlineFrequency={0}
            warpAmount={0}
          />
          {/* 左上角 Logo */}
          <div className="absolute top-6 left-6 z-50">
            <img
              src="images/logo.png"
              alt="Logo"
              className="h-12 w-auto object-contain"
            />
          </div>
          <div className="w-full max-w-[1000px] flex relative z-10">
          {/* 左侧品牌区域 */}
          <div className="hidden lg:flex lg:w-1/2 brand-section">
            <div className="flex flex-col justify-center items-start px-12 py-20 text-left">
              <div className="mb-12">
                <h1 className="text-4xl font-bold mb-4 text-gradient text-glow">
                  H5活动管理系统
                </h1>
                <p className="text-xl text-gray-600 text-glow text-hover-effect transition-all duration-300">
                  佛山传媒文旅集团有限公司
                </p>
              </div>
              <div className="space-y-6">
                <div className="flex items-center justify-start transform hover:translate-x-2 transition-all duration-300">
                  <span className="w-2 h-2 bg-blue-500 rounded-full mr-3"></span>
                  <span className="text-lg text-gray-700">高效管理H5活动</span>
                </div>
                <div className="flex items-center justify-start transform hover:translate-x-2 transition-all duration-300">
                  <span className="w-2 h-2 bg-blue-500 rounded-full mr-3"></span>
                  <span className="text-lg text-gray-700">实时数据统计与分析</span>
                </div>
                <div className="flex items-center justify-start transform hover:translate-x-2 transition-all duration-300">
                  <span className="w-2 h-2 bg-blue-500 rounded-full mr-3"></span>
                  <span className="text-lg text-gray-700">支持多种活动类型</span>
                </div>
                <div className="flex items-center justify-start transform hover:translate-x-2 transition-all duration-300">
                  <span className="w-2 h-2 bg-blue-500 rounded-full mr-3"></span>
                  <span className="text-lg text-gray-700">安全可靠的系统架构</span>
                </div>
              </div>
              <div className="mt-16">
                <p className="text-sm text-gray-500 opacity-80">
                  © 2026 佛山传媒文旅集团有限公司
                </p>
              </div>
            </div>
          </div>

          {/* 右侧登录表单 */}
          <div className="flex-1 flex items-center justify-center px-4 py-12 login-form">
            <div className="w-full max-w-md">
              {/* 移动端品牌标识 */}
              <div className="lg:hidden mb-8 text-center">
                <h1 className="text-2xl font-bold text-gray-900 mb-2">H5活动管理系统</h1>
                <p className="text-sm text-gray-500">佛山传媒文旅集团有限公司</p>
              </div>

              {/* 登录表单 */}
              <form onSubmit={handleLogin} className="bg-white rounded-3xl shadow-lg p-8">
                <h2 className="text-2xl font-bold text-gray-900 mb-6 text-center">
                  欢迎登录
                </h2>

                {/* 错误信息 */}
                {errors.length > 0 && (
                  <>
                    {errors[0].includes('已禁用') ? (
                      <div className="mb-6 p-4 bg-yellow-50 border border-yellow-300 rounded-lg">
                        <div className="flex items-start">
                          <div className="flex-shrink-0">
                            <svg className="w-5 h-5 text-yellow-600 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                          </div>
                          <div className="ml-3">
                            <h3 className="text-sm font-medium text-yellow-800">账号已被禁用</h3>
                            <div className="mt-2 text-sm text-yellow-700">
                              <p>您的账号已被系统管理员禁用，暂时无法登录。</p>
                              <p className="mt-1">如需恢复账号，请联系系统管理员。</p>
                            </div>
                          </div>
                        </div>
                      </div>
                    ) : (
                      <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
                        {errors.map((error, index) => (
                          <div key={index} className="flex items-center text-red-600 text-sm">
                            <Icon name="AlertCircle" className="w-4 h-4 mr-2 flex-shrink-0 text-red-500" />
                            {error}
                          </div>
                        ))}
                      </div>
                    )}
                  </>
                )}

                {/* 成功信息 */}
                {successMessage && (
                  <div className="mb-6 p-4 bg-green-50 border border-green-200 rounded-lg">
                    <div className="flex items-center text-green-600">
                      <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path>
                      </svg>
                      {successMessage}
                    </div>
                  </div>
                )}

                {/* 用户名输入 */}
                <div className="mb-6">
                  <label htmlFor="username" className="block text-sm font-medium text-gray-700 mb-2">
                    用户名
                  </label>
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <Icon name="User" className="h-5 w-5 text-gray-400" />
                    </div>
                    <input
                      id="username"
                      type="text"
                      value={username}
                      onChange={(e) => setUsername(e.target.value)}
                      onKeyPress={handleKeyPress}
                      className="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm input-focus"
                      placeholder="请输入用户名"
                      disabled={isLoading}
                    />
                  </div>
                </div>

                {/* 密码输入 */}
                <div className="mb-6">
                  <label htmlFor="password" className="block text-sm font-medium text-gray-700 mb-2">
                    密码
                  </label>
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <Icon name="Lock" className="h-5 w-5 text-gray-400" />
                    </div>
                    <input
                      id="password"
                      type={showPassword ? 'text' : 'password'}
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      onKeyPress={handleKeyPress}
                      className="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm input-focus"
                      placeholder="请输入密码"
                      disabled={isLoading}
                    />
                    <div className="absolute inset-y-0 right-0 pr-3 flex items-center">
                      <button
                        type="button"
                        onClick={() => setShowPassword(!showPassword)}
                        className="password-toggle text-gray-400 hover:text-gray-500 focus:outline-none"
                        disabled={isLoading}
                      >
                        {showPassword ? (
                          <Icon name="EyeOff" className="h-5 w-5" />
                        ) : (
                          <Icon name="Eye" className="h-5 w-5" />
                        )}
                      </button>
                    </div>
                  </div>
                </div>

                {/* 记住我和忘记密码 */}
                <div className="mb-6 flex items-center justify-between">
                  <div className="flex items-center">
                    <input
                      id="rememberMe"
                      type="checkbox"
                      checked={rememberMe}
                      onChange={(e) => setRememberMe(e.target.checked)}
                      className="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded"
                      disabled={isLoading}
                    />
                    <label htmlFor="rememberMe" className="ml-2 block text-sm text-gray-700">
                      记住我
                    </label>
                  </div>
                  <div className="text-sm">
                    <a href="#" className="font-medium text-blue-600 hover:text-blue-500">
                      忘记密码？
                    </a>
                  </div>
                </div>

                {/* 登录按钮 */}
                <button
                  type="submit"
                  disabled={isLoading}
                  className="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-blue-500 hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 btn-login transition-all duration-200"
                >
                  {isLoading ? (
                    <div className="flex items-center">
                      <div className="loading-spinner mr-2"></div>
                      登录中...
                    </div>
                  ) : (
                    <div className="flex items-center">
                      登录
                    </div>
                  )}
                </button>

              </form>
            </div>
          </div>
        </div>
        </div>
      );
    }

    // 渲染应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LoginApp />);
  </script>
</body>
</html>
