    @media (max-width: 640px) {

    const { useState, useEffect, useRef } = React;

    // Markdown 到 HTML 简单解析器 - 与canvas.html保持一致
    const markdownToHtml = (markdown) => {
      let result = '';
      const lines = markdown.split('\n');
      let inCodeBlock = false;
      let codeContent = [];

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // 检查是否进入或退出代码块
        if (line.startsWith('```')) {
          if (inCodeBlock) {
            // 退出代码块 - 渲染代码块
            const escapedContent = codeContent.join('\n')
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&#039;');

            result += `<pre style="background: #f8fafc; padding: 1rem; border-radius: 0.75rem; margin: 1rem 0; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size: 0.875rem; line-height: 1.7; color: #475569; border: 1px solid #e2e8f0; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; max-width: 100%; box-sizing: border-box;">${escapedContent}</pre>`;

            codeContent = [];
            inCodeBlock = false;
          } else {
            // 进入代码块
            inCodeBlock = true;
          }
          continue;
        }

        if (inCodeBlock) {
          // 在代码块内，直接保存内容
          codeContent.push(line);
          continue;
        }

        // 不在代码块内，正常处理
        let processedLine = line;

        // 标题
        if (processedLine.startsWith('### ')) {
          processedLine = `<h3 style="font-size: 18px; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #1e293b; word-wrap: break-word; overflow-wrap: break-word;">${processedLine.substring(4)}</h3>`;
        } else if (processedLine.startsWith('## ')) {
          processedLine = `<h2 style="font-size: 22px; font-weight: 700; margin-top: 1.75rem; margin-bottom: 0.875rem; color: #1e293b; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; word-wrap: break-word; overflow-wrap: break-word;">${processedLine.substring(3)}</h2>`;
        } else if (processedLine.startsWith('# ')) {
          processedLine = `<h1 style="font-size: 26px; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; color: #1e293b; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.75rem; word-wrap: break-word; overflow-wrap: break-word;">${processedLine.substring(2)}</h1>`;
        }
        // 引用
        else if (processedLine.startsWith('> ')) {
          processedLine = `<blockquote style="border-left: 3px solid #3b82f6; padding-left: 1rem; margin: 1rem 0; color: #64748b; font-style: italic; background: #f1f5f9; padding-right: 1rem; padding-top: 0.5rem; padding-bottom: 0.5rem; border-radius: 0 0.5rem 0.5rem 0; word-wrap: break-word;">${processedLine.substring(2)}</blockquote>`;
        }
        // 无序列表
        else if (processedLine.startsWith('- ') || processedLine.startsWith('* ')) {
          let content = processedLine.substring(2);
          // 粗体
          content = content
            .replace(/\*\*(.*?)\*\*/gim, '<strong style="font-weight: 600; color: #1e293b;">$1</strong>')
            .replace(/__(.*?)__/gim, '<strong style="font-weight: 600; color: #1e293b;">$1</strong>');
          // 斜体
          content = content
            .replace(/\*(.*?)\*/gim, '<em style="font-style: italic;">$1</em>')
            .replace(/_(.*?)_/gim, '<em style="font-style: italic;">$1</em>');
          // 链接
          content = content
            .replace(/\[([^\]]*)\]\(([^\)]+)\)/gim, '<a href="$2" target="_blank" style="color: #2563eb; text-decoration: underline; text-underline-offset: 2px; word-wrap: break-word; overflow-wrap: break-word;">$1</a>');
          // 行内代码
          content = content
            .replace(/`([^`]*?)`/gim, '<code style="background: #f1f5f9; padding: 0.125rem 0.375rem; border-radius: 0.375rem; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, \"Liberation Mono\", \"Courier New\", monospace; font-size: 0.875em; color: #dc2626; word-wrap: break-word;">$1</code>');
          // 图片
          content = content
            .replace(/!\[([^\]]*)\]\(([^\)]+)\)/gim, '<img src="$2" alt="$1" style="max-width: 100%; width: 100%; height: auto; border-radius: 8px; margin: 0.5rem 0; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: block; box-sizing: border-box; overflow: hidden;">');
          processedLine = `<li style="margin-left: 1.5rem; list-style-type: disc; margin-top: 0.25rem; margin-bottom: 0.25rem; color: #475569; word-wrap: break-word;">${content}</li>`;
        }
        // 有序列表
        else if (/^\d+\. /.test(processedLine)) {
          let content = processedLine.replace(/^\d+\. /, '');
          // 粗体
          content = content
            .replace(/\*\*(.*?)\*\*/gim, '<strong style="font-weight: 600; color: #1e293b;">$1</strong>')
            .replace(/__(.*?)__/gim, '<strong style="font-weight: 600; color: #1e293b;">$1</strong>');
          // 斜体
          content = content
            .replace(/\*(.*?)\*/gim, '<em style="font-style: italic;">$1</em>')
            .replace(/_(.*?)_/gim, '<em style="font-style: italic;">$1</em>');
          // 链接
          content = content
            .replace(/\[([^\]]*)\]\(([^\)]+)\)/gim, '<a href="$2" target="_blank" style="color: #2563eb; text-decoration: underline; text-underline-offset: 2px; word-wrap: break-word; overflow-wrap: break-word;">$1</a>');
          // 行内代码
          content = content
            .replace(/`([^`]*?)`/gim, '<code style="background: #f1f5f9; padding: 0.125rem 0.375rem; border-radius: 0.375rem; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, \"Liberation Mono\", \"Courier New\", monospace; font-size: 0.875em; color: #dc2626; word-wrap: break-word;">$1</code>');
          // 图片
          content = content
            .replace(/!\[([^\]]*)\]\(([^\)]+)\)/gim, '<img src="$2" alt="$1" style="max-width: 100%; width: 100%; height: auto; border-radius: 8px; margin: 0.5rem 0; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: block; box-sizing: border-box; overflow: hidden;">');
          processedLine = `<li style="margin-left: 1.5rem; list-style-type: decimal; margin-top: 0.25rem; margin-bottom: 0.25rem; color: #475569; word-wrap: break-word;">${content}</li>`;
        }
        // 分隔线
        else if (processedLine.startsWith('---')) {
          processedLine = `<hr style="border: none; border-top: 1px solid #e2e8f0; margin: 1.5rem 0;">`;
        }
        // 普通段落
        else if (processedLine.trim() !== '') {
          // 粗体
          processedLine = processedLine
            .replace(/\*\*(.*?)\*\*/gim, '<strong style="font-weight: 600; color: #1e293b;">$1</strong>')
            .replace(/__(.*?)__/gim, '<strong style="font-weight: 600; color: #1e293b;">$1</strong>');
          // 斜体
          processedLine = processedLine
            .replace(/\*(.*?)\*/gim, '<em style="font-style: italic;">$1</em>')
            .replace(/_(.*?)_/gim, '<em style="font-style: italic;">$1</em>');
          // 链接
          processedLine = processedLine
            .replace(/\[([^\]]*)\]\(([^\)]+)\)/gim, '<a href="$2" target="_blank" style="color: #2563eb; text-decoration: underline; text-underline-offset: 2px; word-wrap: break-word; overflow-wrap: break-word;">$1</a>');
          // 行内代码
          processedLine = processedLine
            .replace(/`([^`]*?)`/gim, '<code style="background: #f1f5f9; padding: 0.125rem 0.375rem; border-radius: 0.375rem; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 0.875em; color: #dc2626; word-wrap: break-word;">$1</code>');
          // 图片
          processedLine = processedLine
            .replace(/!\[([^\]]*)\]\(([^\)]+)\)/gim, '<img src="$2" alt="$1" style="max-width: 100%; width: 100%; height: auto; border-radius: 8px; margin: 0.5rem 0; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: block; box-sizing: border-box; overflow: hidden;">');

          processedLine = `<p style="margin: 0.5rem 0; line-height: 1.8; color: #475569; word-wrap: break-word;">${processedLine}</p>`;
        }

        result += processedLine;
      }

      return result;
    };

    const Icon = ({ name, className, style, fill }) => {

      };

      if (!icons[name]) return null;

      return React.createElement("svg", {
        xmlns: "http://www.w3.org/2000/svg",
        width: "24",
        height: "24",
        viewBox: "0 0 24 24",
        fill: fill,

        className: className,
        style: style
      }, icons[name]);
    };

    // 解析组件的实际尺寸（与编辑页面完全一致）
    const parseSize = (size, isWidth = true) => {
      if (!size) return isWidth ? 390 : 100;
      if (typeof size === 'number') return size;
      if (size.endsWith('%')) {
        const percent = parseFloat(size);
        return isWidth ? (percent / 100) * 390 : (percent / 100) * 745; // 745 是默认页面高度
      }
      if (size.endsWith('px')) return parseFloat(size);
      return parseFloat(size) || (isWidth ? 390 : 100);
    };

    const generateId = () => Math.random().toString(36).substr(2, 9);

    const parseUrlParams = () => {
      const hash = window.location.hash;
      if (!hash) return null;

      try {
        const path = hash.slice(1);
        console.log('解析hash路径:', path);

        // 新格式: #活动ID/page-数字
        const pathParts = path.split('/');
        if (pathParts.length === 2) {
          const activityId = pathParts[0];
          const pagePath = pathParts[1];

          // 从localStorage获取数据
          const storageKey = `h5-cms-activity-${activityId}`;
          const storedData = localStorage.getItem(storageKey);

          if (!storedData) {
            console.error('未找到活动数据:', activityId);
            return null;
          }

          const data = JSON.parse(storedData);

          // 解析页面信息
          let currentPageIndex = 0;
          if (pagePath) {
            // 首先尝试通过页面ID找到对应的页面
            const pageIndex = data.pages.findIndex(page => page.id === pagePath);
            if (pageIndex !== -1) {
              currentPageIndex = pageIndex;
            } else if (pagePath.startsWith('page-')) {
              // 如果通过ID没找到，尝试通过页码找到（兼容旧格式）
              const pageNumber = parseInt(pagePath.replace('page-', ''));
              currentPageIndex = data.pages.findIndex(page => page.pageNumber === pageNumber) || 0;
            }
            console.log('找到页面索引:', currentPageIndex);
          }

          return {
            ...data,
            currentPageIndex: currentPageIndex
          };
        }

        // 兼容旧格式
        const dataStr = hash.slice(1);
        const decodedData = decodeURIComponent(dataStr);
        const parsed = JSON.parse(decodedData);
        return parsed;
      } catch (error) {
        console.error('解析URL数据失败:', error);
        return null;
      }
    };

    const App = () => {
      const [data, setData] = useState(null);
      const [canvasModes, setCanvasModes] = useState({});
      const [isLoading, setIsLoading] = useState(true);
      const [error, setError] = useState(null);
      const [formData, setFormData] = useState({});
      const [radioStates, setRadioStates] = useState({});
      const [checkboxStates, setCheckboxStates] = useState({});
      const [ratingStates, setRatingStates] = useState({});
      const [currentPageIndex, setCurrentPageIndex] = useState(0);

      // 画布容器ref和当前宽度
      const canvasContainerRef = useRef(null);
      const [canvasWidth, setCanvasWidth] = useState(390); // 默认宽度

      // 从URL解析活动ID
      const parseActivityIdFromUrl = () => {
        // 支持两种格式：?id=xxx 或者 #xxx/page-1
        const params = new URLSearchParams(window.location.search);
        const idFromQuery = params.get('id');
        if (idFromQuery) return { id: idFromQuery, pageId: null };

        const hash = window.location.hash;
        if (hash && hash.length > 1) {
          const parts = hash.slice(1).split('/');
          if (parts[0] && parts[0].length >= 1) {
            return {
              id: parts[0],
              pageId: parts.length > 1 ? parts[1] : null
            };
          }
        }
        return null;
      };

      // 加载活动数据
      const loadActivityData = async (activityIdentifier, pageId) => {
        try {
          if (!window.H5CmsAPI) {
            throw new Error('API未加载');
          }

          let activity = null;
          let error = null;

          // 先尝试按自定义activity_id查找
          try {
            const result = await H5CmsAPI.ActivityAPI.getByActivityId(activityIdentifier);
            activity = result.data;
          } catch (e) {
            // 如果按activity_id查找失败，再尝试按UUID主键查找
            const result = await H5CmsAPI.ActivityAPI.getDetail(activityIdentifier);
            activity = result.data;
          }

          if (!activity) {
            throw new Error('活动不存在');
          }

          console.log('加载活动成功:', activity);

          // 设置浏览器标签标题为活动名称
          if (activity.name && activity.name.trim()) {
            document.title = activity.name;
          }

          if (activity.page_config && activity.page_config.pages && activity.page_config.pageComponents) {
            // 转换数据结构，确保 settings 对象包含所有配置
            // 确保每个页面都有 bgAttachment 属性，默认 'fill'
            const pagesWithAttachment = activity.page_config.pages.map(page => ({
              ...page,
              bgAttachment: page.bgAttachment || 'fill'
            }));

            const dataWithSettings = {
              ...activity.page_config,
              pages: pagesWithAttachment,
              settings: {
                componentPadding: activity.page_config.componentPadding,
                componentGap: activity.page_config.componentGap,
                enableGridSnap: activity.page_config.enableGridSnap,
                pageFontSize: activity.page_config.pageFontSize
              }
            };
            setData(dataWithSettings);
            // 加载canvasModes
            if (activity.page_config.canvasModes) {
              setCanvasModes(activity.page_config.canvasModes);
            }

                  className: 'w-full min-w-0 box-border bg-white border border-slate-200 rounded-xl px-4 py-3.5 text-slate-700 text-sm shadow-sm cursor-pointer appearance-none',
                  style: { width: '100% !important', maxWidth: '100%' },
                  value: formData[comp.id] || '',
                  onChange: (e) => handleInputChange(comp.id, e.target.value)
                },
                  React.createElement('option', { value: '' }, '请选择'),
                  (comp.options || []).map((opt, idx) =>
                    React.createElement('option', { key: idx, value: opt }, opt)
                  )
                ),
                React.createElement('div', {
                  className: 'absolute inset-y-0 right-4 flex items-center pointer-events-none',
                  style: { pointerEvents: 'none' }
                },
                  React.createElement(Icon, {
                    name: 'ChevronDown',
                    style: {
                      width: '20px',
                      height: '20px',
                      color: '#64748b'
                    },
                    className: 'shrink-0'
                  })
                )
              )
            );

          case 'rating':
            const safeMaxStars = Math.max(1, Math.min(20, Number(comp.maxStars) || 5));
            const currentRating = Number(ratingStates[comp.id] ?? comp.value ?? 0);
            return React.createElement('div', { className: 'w-full h-full flex flex-col justify-center box-border' },
              React.createElement('label', { className: 'block text-[13px] font-bold text-slate-700 mb-2 pl-1' },
                [comp.label, comp.required ? React.createElement('span', { className: 'text-red-500 ml-1' }, '*') : null]
              ),
              comp.subLabel && React.createElement('div', {
                style: { fontSize: '12px', color: '#6b7280' },
                className: 'pl-1 mb-1'
              }, comp.subLabel),
              React.createElement('div', {
                className: 'flex items-center bg-white border border-slate-200 rounded-xl px-4 py-3 shadow-sm flex-wrap',
                style: { gap: (comp.iconGap ?? 6) + 'px' }
              },
                Array.from({ length: safeMaxStars }).map((_, i) =>
                  React.createElement('div', {
                    key: i,
                    onClick: () => handleRatingChange(comp.id, i + 1),
                    className: 'cursor-pointer transition-transform hover:scale-110',
                    style: { display: 'inline-flex' }
                  },
                    React.createElement(Icon, {
                      name: comp.iconType || 'Star',
                      style: {
                        width: (comp.iconSize || 24) + 'px',
                        height: (comp.iconSize || 24) + 'px',
                        color: i < currentRating ? (comp.activeColor || '#facc15') : '#cbd5e1'
                      },
                      fill: i < currentRating ? (comp.activeColor || '#facc15') : 'none',
                      className: 'shrink-0 transition-colors'
                    })
                  )
                )
              )
            );

          case 'divider':
            return React.createElement('div', {
              style: {
                height: comp.height || '1px',
                backgroundColor: comp.color || '#e5e7eb',
                margin: `${comp.marginTop || 0}px 0 ${comp.marginBottom || 0}px`
              },
              className: 'w-full'
            });

          case 'shape':
            return React.createElement('div', {
              style: {
                backgroundColor: comp.fillColor,
                borderColor: comp.strokeColor,
                borderWidth: comp.strokeWidth,
                borderStyle: comp.strokeWidth > 0 ? 'solid' : 'none',
                borderRadius: comp.borderRadius || '0px',
                width: '100%',
                height: '100%'
              },
              className: 'w-full h-full'
            });

          default:
            return React.createElement('div', {
              className: 'w-full h-full bg-slate-100/80 border border-dashed border-slate-300 flex items-center justify-center text-slate-500 text-xs'
            }, '未知组件');
        }
      };

      const renderPage = (page, pageId) => {
        const components = data.pageComponents[pageId] || [];
        console.log('渲染页面:', pageId, '组件数量:', components.length, '组件:', components);

        // 使用保存的canvasMode，没有则回退到推断
        let isListMode = false;
        if (canvasModes[pageId] !== undefined) {
          isListMode = canvasModes[pageId] === 'list';
        } else {
          // 回退：检查是否是列表模式组件（没有 x 和 y 坐标）
          isListMode = components.some(comp => comp.x === undefined || comp.x === null || comp.y === undefined || comp.y === null);
        }
        console.log('页面', pageId, '模式:', canvasModes[pageId], 'isListMode=', isListMode);

        // 完全复制canvas.html预览模式的画板容器结构（去除iPhone边框、状态栏和导航栏）
        // 限制页面高度，使移动端设备可以在这个高度范围内上下滚动
        // 自适应宽度：小屏幕100%宽，大屏幕限制最大宽度430px
        return React.createElement("div", {
          className: "w-full max-w-[430px] bg-white relative overflow-hidden flex flex-col shadow-xl shadow-slate-200/50 z-10 mx-auto",
          style: {
            height: page.height,
            maxHeight: '100vh'
          }
        },
          // 画布内容区 - 完全复制canvas.html，允许在页面高度内滚动
          React.createElement("div", {
            ref: canvasContainerRef,
            className: "flex-1 overflow-y-auto flex justify-center custom-scrollbar",
            style: {
              zIndex: 40,
              // 固定模式：背景在外层滚动容器上
              backgroundColor: page.bgAttachment === 'fixed' ? page.bgColor : 'transparent',
              backgroundImage: page.bgAttachment === 'fixed' && page.bgImage ? `url(${page.bgImage})` : 'none',
              backgroundSize: page.bgAttachment === 'fixed' ? 'cover' : 'auto',
              backgroundPosition: 'center',
              backgroundAttachment: page.bgAttachment === 'fixed' ? 'fixed' : 'scroll'
            }
          },
            isListMode ? React.createElement("div", {
              className: "relative drop-area flex-shrink-0 flex flex-col",
              style: {
                minHeight: `${page.height}px`,
                padding: '0 0px',
                width: '100%',
                // 填充模式：背景在内层内容容器上
                backgroundColor: page.bgAttachment === 'fill' ? page.bgColor : 'transparent',
                backgroundImage: page.bgAttachment === 'fill' && page.bgImage ? `url(${page.bgImage})` : 'none',
                backgroundSize: 'cover',
                backgroundPosition: 'center'
              }
            },
              (components.length === 0 && React.createElement("div", {
                className: "absolute inset-0 flex flex-col items-center justify-center text-gray-400 pointer-events-none"
              },
                React.createElement("div", { className: "w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mb-3 border-2 border-dashed border-gray-300" },
                  React.createElement(Icon, { name: "Plus", className: "w-8 h-8 opacity-50" })
                ),
                React.createElement("span", { className: "text-sm font-bold text-gray-400" }, "暂无内容")
              )),
              components.map((comp, index) => {
                if (comp.visible === false) return null;

                console.log('渲染列表模式组件:', comp.id, '尺寸:', comp.width, comp.height, '边距:', comp.marginTop, comp.marginBottom, '对齐方式:', comp.alignX);

                return React.createElement(React.Fragment, { key: comp.id },
                  React.createElement("div", {
                    id: `list-comp-${comp.id}`,
                    className: `relative flex w-full transition-opacity duration-200 z-0`,
                    style: {
                      marginTop: (comp.marginTop ?? (data.settings?.componentGap || 16)) + 'px',
                      marginBottom: (comp.marginBottom ?? 0) + 'px'
                    }
                  },
                    React.createElement("div", {
                      className: `w-full transition-all duration-150`,
                      style: {
                        width: comp.width || 'auto',
                        height: comp.height || 'auto',
                        marginLeft: comp.alignX === 'left' ? (data.settings?.componentPadding || 16) + 'px' : comp.alignX === 'right' ? 'auto' : (data.settings?.componentPadding || 16) + 'px',
                        marginRight: comp.alignX === 'right' ? (data.settings?.componentPadding || 16) + 'px' : comp.alignX === 'left' ? 'auto' : (data.settings?.componentPadding || 16) + 'px',
                        outline: 'none',
                        outlineOffset: '2px',
                        borderRadius: '8px',
                        position: 'static',
                        zIndex: 'auto'
                      }
                    },
                      renderComponent(comp)
                    )
                  )
                );
              })
            ) : React.createElement("div", {
              ref: canvasContainerRef,
              className: "relative drop-area flex-shrink-0",
              style: {
                height: `${page.height}px`,
                width: '100%',
                // 填充模式：背景在内层内容容器上
                backgroundColor: page.bgAttachment === 'fill' ? page.bgColor : 'transparent',
                backgroundImage: page.bgAttachment === 'fill' && page.bgImage ? `url(${page.bgImage})` : 'none',
                backgroundSize: 'cover',
                backgroundPosition: 'center'
              }
            },
              components.map(comp => {
                if (comp.visible === false) return null;

                console.log('渲染自由模式组件:', comp.id, '位置:', comp.x, comp.y, '尺寸:', comp.width, comp.height, '原点:', comp.origin);

                // 解析组件的实际尺寸
                const width = parseSize(comp.width, true);
                const height = parseSize(comp.height || 'auto', false);

                // 根据原点计算偏移量
                const origin = comp.origin || 'c';
                let left = comp.x || 0;
                let top = comp.y || 0;

                // 设计时的画布宽度
                const designWidth = 390;

                // 计算组件相对于设计画布中心的位置
                let componentLeft = comp.x || 0;
                let componentTop = comp.y || 0;

                // 先根据原点计算初始位置（相对于设计宽度）
                switch (origin) {
                  case 'n': // 上中
                    componentLeft -= width / 2;
                    break;
                  case 'ne': // 右上
                    componentLeft -= width;
                    break;
                  case 'w': // 左中
                    componentTop -= height / 2;
                    break;
                  case 'c': // 中心
                    componentLeft -= width / 2;
                    componentTop -= height / 2;
                    break;
                  case 'e': // 右中
                    componentLeft -= width;
                    componentTop -= height / 2;
                    break;
                  case 'sw': // 左下
                    componentTop -= height;
                    break;
                  case 's': // 下中
                    componentLeft -= width / 2;
                    componentTop -= height;
                    break;
                  case 'se': // 右下
                    componentLeft -= width;
                    componentTop -= height;
                    break;
                  case 'nw': // 左上（默认）
                  default:
                    break;
                }

                // 计算组件相对于设计画布中心的偏移
                const designCenterX = designWidth / 2;
                const componentCenterX = componentLeft + width / 2;
                const centerOffsetX = componentCenterX - designCenterX;

                // 根据实际画布宽度计算新位置
                const actualCenterX = canvasWidth / 2;
                left = actualCenterX - width / 2 + centerOffsetX;
                top = componentTop;

                console.log('  计算后位置 - left:', left, 'top:', top, 'width:', width, 'height:', height, 'canvasWidth:', canvasWidth);

                return React.createElement("div", {
                  key: comp.id,
                  style: {
                    top: `${top}px`,
                    left: `${left}px`,
                    width: comp.width || '100%',
                    height: comp.height || 'auto',
                    cursor: 'default',
                    userSelect: 'text',
                    zIndex: 1,
                    position: 'absolute'
                  }
                }, renderComponent(comp));
              })
            )
          )
        );
      };

      if (isLoading) {
        return React.createElement('div', {
          className: 'w-full h-screen bg-black flex items-center justify-center'
        },
          React.createElement('div', { className: 'text-center' },
            React.createElement('div', { className: 'animate-spin rounded-full h-12 w-12 border-b-2 border-white mx-auto mb-4' }),
            React.createElement('p', { className: 'text-white' }, '加载中...')
          )
        );
      }

      if (error) {
        return React.createElement('div', {
          className: 'w-full h-screen bg-black flex items-center justify-center'
        },
          React.createElement('div', { className: 'text-center max-w-md mx-4' },
            React.createElement('div', { className: 'bg-red-100 text-red-500 p-3 rounded-full w-12 h-12 flex items-center justify-center mx-auto mb-4' }),
            React.createElement('h2', { className: 'text-lg font-bold text-white mb-2' }, '加载失败'),
            React.createElement('p', { className: 'text-gray-300 mb-4' }, error),
            React.createElement('button', {
              onClick: () => window.location.reload(),
              className: 'px-4 py-2 bg-white text-black rounded-md hover:bg-gray-200 transition-colors'
            }, '重新加载')
          )
        );
      }

      // 只渲染当前页面，删除页面切换组件
      const currentPage = data.pages[currentPageIndex];
      const pageBgColor = currentPage.bgColor || '#ffffff';
      return React.createElement('div', {
        className: 'w-full h-screen flex items-center justify-center overflow-hidden',
        style: { backgroundColor: pageBgColor }
      },
        React.createElement('div', {
          className: 'w-full h-full overflow-hidden'
        },
          renderPage(data.pages[currentPageIndex], data.pages[currentPageIndex].id)
        )
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
